# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Github Actions Java Test Workflow
run-name: Running Tests on Github Actions

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  java-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Maven tests
        run: mvn clean test

      - name: List generated files
        if: always()
        run: |
          echo "Current directory:"
          pwd
          echo "Project files:"
          ls -la
          echo "Target folder:"
          ls -la target || true
          echo "Surefire reports:"
          ls -la target/surefire-reports || true
          echo "Test output folder:"
          ls -la test-output || true

      - name: Upload Maven Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-surefire-test-reports
          path: target/surefire-reports/

      - name: Upload Persistent Test TXT Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persistent-test-txt-files
          path: |
            test-output/
            **/*.txt